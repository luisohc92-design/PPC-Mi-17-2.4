	#lovable-badge {
		--badge-bg: #1b1b1b;
		--badge-text: #c5c1b9;
		--badge-text-hover: #dcdad5;
		--badge-radius: 6px;
		--badge-padding: 8px;
		--badge-gap: 6px;
		--badge-shadow: 
			0 0 0 1px rgba(0, 0, 0, 0.88),
			0 1px 0 0 rgba(0, 0, 0, 0.04),
			0 2px 2px -1px rgba(0, 0, 0, 0.08),

			0 8px 8px -4px rgba(0, 0, 0, 0.08),
			0 16px 16px -8px rgba(0, 0, 0, 0.08);
		--badge-transition-duration: 0.2s;
		--badge-transition-easing: cubic-bezier(0.16, 1, 0.32, 1);
		--focus-color: #575ECF;
		--focus-offset: 2px;
		--focus-width: 2px;
		
		position: fixed;
		bottom: 12px;
		right: 12px;
		height: 24px;
		display: flex;
		align-items: center;
		z-index: 1000000;
		background-color: var(--badge-bg);
		color: var(--badge-text);
		border-radius: var(--badge-radius);
		box-shadow: var(--badge-shadow);
		font-size: 12px;
		font-family: CameraPlainVariable, "CameraPlainVariable Fallback", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		font-weight: 400 !important;
		text-transform: none !important;
		font-feature-settings: normal !important;
		transform: translateZ(0);
		will-change: transform, opacity;
	}

	#lovable-badge-cta {
		display: flex;
		align-items: center;
		gap: var(--badge-gap);
		padding: 0 var(--badge-padding);
		height: 100%;
		color: inherit;
		text-decoration: none;
		white-space: nowrap;
		border-radius: var(--badge-radius) 0 0 var(--badge-radius);
		transition: 
			background-color var(--badge-transition-duration) ease,
			color var(--badge-transition-duration) ease,
			transform 0.1s ease;
	}

	#lovable-badge-cta:hover {
		background: rgba(255, 255, 255, 0.04);
		color: var(--badge-text-hover);
	}

	#lovable-badge-cta:active {
		transform: scale(0.98);
	}

	#lovable-badge-cta:focus {
		outline: none;
	}

	#lovable-badge-cta:focus-visible {
		outline: var(--focus-width) solid var(--focus-color);
		outline-offset: var(--focus-offset);
		z-index: 1;
	}

	#lovable-badge-text {
		line-height: 1;
	}

	#lovable-badge-divider {
		width: 1px;
		height: 24px;
		background-color: rgba(255, 255, 255, 0.04);
		flex-shrink: 0;
	}

	#lovable-badge-close {
		width: 24px;
		height: 24px;
		min-width: 24px;
		min-height: 24px;
		cursor: pointer;
		background: none;
		border: none;
		padding: 0;
		display: flex;
		align-items: center;
		justify-content: center;
		border-radius: 0 var(--badge-radius) var(--badge-radius) 0;
		flex-shrink: 0;
		transition: 
			background-color var(--badge-transition-duration) ease,
			transform 0.1s ease;
	}

	#lovable-badge-close:hover {
		background: rgba(255, 255, 255, 0.04);
	}

	#lovable-badge-close:active {
		transform: scale(0.92);
	}

	#lovable-badge-close:focus {
		outline: none;
	}

	#lovable-badge-close:focus-visible {
		outline: var(--focus-width) solid var(--focus-color);
		outline-offset: calc(var(--focus-offset) * -1);
		z-index: 1;
	}

	#lovable-badge-close svg path {
		fill: var(--badge-text);
		transition: fill var(--badge-transition-duration) ease;
	}

	#lovable-badge-close:hover svg path {
		fill: var(--badge-text-hover);
	}

	@media (prefers-reduced-motion: reduce) {
		#lovable-badge-cta,
		#lovable-badge-close,
		#lovable-badge-close svg path {
			transition: none;
		}
		
		#lovable-badge-cta:active,
		#lovable-badge-close:active {
			transform: none;
		}
	}

	@media (prefers-contrast: high) {
		#lovable-badge {
			--badge-bg: #000;
			--badge-text: #fff;
			--badge-text-hover: #fff;
			border: 2px solid currentColor;
		}
		
		#lovable-badge-cta:focus-visible,
		#lovable-badge-close:focus-visible {
			outline-width: 3px;
		}
	}

  elevacion_aterrizaje: { planKey:'alt2',           inputId:'a2',              type:'number', aliases:['altitud barometrica de aterrizaje','altitud barometrica aterrizaje','altitud barométrica de aterrizaje','altitud barométrica aterrizaje','elevacion de aterrizaje','elevacion aterrizaje','elevación de aterrizaje','elevación aterrizaje','elevacion destino','elevación destino','altitud de aterrizaje','altitud aterrizaje','altitud llegada','altitud de llegada','altura de aterrizaje','altura aterrizaje','altura de llegada','altura llegada','altura destino','elevacion final','elevación final'] },

  bingo:                { planKey:'bingo',          inputId:'bingo',           type:'number', aliases:['bingo'] },
  distancia:            { planKey:'distanciaMN',    inputId:'dist',            type:'number', aliases:['distancia millas nauticas','distancia millas','distancia mn','distancia'] },
  pax:                  { planKey:'pax',            inputId:'pax',             type:'number', aliases:['pasajeros','paxes','pax'] },
  carga:                { planKey:'carga',          inputId:'carga',           type:'number', aliases:['carga'] }
};

// --- CAMPOS BLOQUEADOS (calculados automáticamente, ignorar por voz) ---
var BLOCKED_FIELDS = [
  'combustible de aterrizaje','combustible aterrizaje','combustible llegada','fuel aterrizaje','fuel llegada',
  'peso combustible','peso de combustible','peso del combustible',
  'peso carga','peso pasajeros','peso de carga','peso de pasajeros','peso carga pasajeros','peso carga y pasajeros'
];

// --- DICCIONARIO NUMÉRICO ESPAÑOL ---
var WORD_NUMS = {
  'cero':0,'uno':1,'una':1,'dos':2,'tres':3,'cuatro':4,'cinco':5,'seis':6,'siete':7,'ocho':8,'nueve':9,
  'diez':10,'once':11,'doce':12,'trece':13,'catorce':14,'quince':15,
  'dieciseis':16,'dieciséis':16,'diecisiete':17,'dieciocho':18,'diecinueve':19,
  'veinte':20,'veintiuno':21,'veintidos':22,'veintidós':22,'veintitres':23,'veintitrés':23,
  'veinticuatro':24,'veinticinco':25,'veintiseis':26,'veintiséis':26,'veintisiete':27,'veintiocho':28,'veintinueve':29,
  'treinta':30,'cuarenta':40,'cincuenta':50
};

// Convierte texto hablado en número entero. Ej: "dos mil quinientos" → 2500
function parseSpokenNumber(text) {
  text = text.trim().toLowerCase();
  var direct = Number(text);
  if (!isNaN(direct) && text !== '') return direct;

  var negative = false;
  if (text.startsWith('menos ')) { negative = true; text = text.substring(6).trim(); }

  var parts = text.split(/\s+/);
  var total = 0, current = 0;

  for (var i = 0; i < parts.length; i++) {
    var w = parts[i];
    if (w === 'y') continue;
    if (w === 'mil') {
      current = current === 0 ? 1000 : current * 1000;
      total += current; current = 0;
    } else if (w === 'cien' || w === 'ciento') {
      current = current === 0 ? 100 : current * 100;
    } else if (w === 'doscientos' || w === 'doscientas') { current += 200;
    } else if (w === 'trescientos' || w === 'trescientas') { current += 300;
    } else if (w === 'cuatrocientos' || w === 'cuatrocientas') { current += 400;
    } else if (w === 'quinientos' || w === 'quinientas') { current += 500;
    } else if (w === 'seiscientos' || w === 'seiscientas') { current += 600;
    } else if (w === 'setecientos' || w === 'setecientas') { current += 700;
    } else if (w === 'ochocientos' || w === 'ochocientas') { current += 800;
    } else if (w === 'novecientos' || w === 'novecientas') { current += 900;
    } else if (WORD_NUMS[w] !== undefined) {
      current += WORD_NUMS[w];
    } else {
      var n = Number(w);
      if (!isNaN(n)) current += n;
    }
  }
  total += current;
  return negative ? -total : total;
}

// Convierte texto hablado en formato hora HH:MM. Ej: "cero seis treinta" → "06:30"
function parseSpokenTime(text) {
  text = text.trim().toLowerCase();
  if (/^\d{1,2}:\d{2}$/.test(text)) return text;

  // Correcciones comunes de reconocimiento de voz
  text = text.replace(/\bsies\b/g, 'seis');

  var parts = text.split(/\s+/);
  var nums = [];
  for (var i = 0; i < parts.length; i++) {
    var w = parts[i];
    if (w === 'y' || w === 'horas' || w === 'hora') continue;
    if (WORD_NUMS[w] !== undefined) nums.push(WORD_NUMS[w]);
    else { var n = parseInt(w); if (!isNaN(n)) nums.push(n); }
  }

  if (nums.length === 0) return null;
  var hours, minutes;
  if (nums.length === 1) {
    // "cuatro" → 04:00
    hours = nums[0]; minutes = 0;
  } else if (nums.length === 2) {
    // "cuatro quince" → 04:15, "cuatro treinta" → 04:30
    hours = nums[0]; minutes = nums[1];
  } else if (nums.length === 3) {
    // "cuatro cero cero" → [4,0,0] → 04:00
    // "cero cuatro quince" → [0,4,15] → 04:15
    if (nums[1] === 0 && nums[2] === 0) { hours = nums[0]; minutes = 0; }
    else if (nums[0] === 0) { hours = nums[1]; minutes = nums[2]; }
    else { hours = nums[0]; minutes = nums[1] * 10 + nums[2]; }
  } else if (nums.length === 4) {
    // "cero cuatro cero cero" → [0,4,0,0] → 04:00
    // "cero cuatro uno cinco" → [0,4,1,5] → 04:15
    hours = nums[0] * 10 + nums[1]; minutes = nums[2] * 10 + nums[3];
  } else {
    // 5+ nums: tomar primeros 4
    hours = nums[0] * 10 + nums[1]; minutes = nums[2] * 10 + nums[3];
  }
  if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
  return String(hours).padStart(2,'0') + ':' + String(minutes).padStart(2,'0');
}

// --- NORMALIZAR TEXTO: quitar acentos y puntuación ---
function normalizeVoiceText(text) {
  return text.toLowerCase().replace(/[.,;!?¿¡]/g,'')
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').trim();
}

// --- VERIFICAR SI EL TEXTO CONTIENE CAMPOS BLOQUEADOS ---
function findBlockedMentions(normalizedText) {
  var found = [];
  for (var i = 0; i < BLOCKED_FIELDS.length; i++) {
    var bl = normalizeVoiceText(BLOCKED_FIELDS[i]);
    if (normalizedText.indexOf(bl) !== -1) found.push(BLOCKED_FIELDS[i]);
  }
  return found;
}

// --- LIMPIAR RUIDO DEL TEXTO ANTES DE BUSCAR ALIAS ---
function cleanVoiceNoise(text) {
  // Quitar preposiciones/artículos sueltos que no forman parte de alias
  // pero NO quitar "de","en","y","a","las","los","al","con" porque forman parte de alias como "hora de despegue"
  // Solo quitar frases de relleno comunes
  text = text.replace(/\bsalimos\b/g, '');
  text = text.replace(/\btenemos\b/g, '');
  text = text.replace(/\bcon un\b/g, ' con ');
  text = text.replace(/\ba las\b/g, ' ');
  text = text.replace(/\bgrados\b/g, '');
  text = text.replace(/\bpies\b/g, '');
  text = text.replace(/\bkilos\b/g, '');
  text = text.replace(/\bkilogramos\b/g, '');
  text = text.replace(/\blitros\b/g, '');
  text = text.replace(/\bde combustible\b/g, ' combustible ');
  text = text.replace(/\bde temperatura\b/g, ' temperatura ');
  text = text.replace(/\s+/g, ' ').trim();
  return text;
}

// --- ENCONTRAR TODAS LAS COINCIDENCIAS DE CAMPOS EN EL TEXTO ---
function findAllFieldMatches(normalizedText) {
  var matches = [];
  var keys = Object.keys(FIELD_MAP);
  for (var k = 0; k < keys.length; k++) {
    var field = FIELD_MAP[keys[k]];
    var bestAlias = '', bestPos = -1;
    for (var a = 0; a < field.aliases.length; a++) {
      var alias = normalizeVoiceText(field.aliases[a]);
      var idx = normalizedText.indexOf(alias);
      if (idx !== -1 && alias.length > bestAlias.length) {
        bestAlias = alias;
        bestPos = idx;
      }
    }
    if (bestPos !== -1) {
      matches.push({ key: keys[k], alias: bestAlias, position: bestPos, aliasLength: bestAlias.length });
    }
  }
  // Eliminar alias cortos contenidos dentro de uno largo (priorizar alias más largos)
  matches = matches.filter(function(m) {
    for (var i = 0; i < matches.length; i++) {
      var o = matches[i];
      if (o === m) continue;
      // Si m está contenido dentro de o y o es más largo, eliminar m
      if (m.position >= o.position && (m.position + m.aliasLength) <= (o.position + o.aliasLength) && o.aliasLength > m.aliasLength) return false;
      // Si dos alias empiezan en la misma posición, mantener el más largo
      if (m.position === o.position && o.aliasLength > m.aliasLength) return false;
    }
    return true;
  });
  matches.sort(function(a, b) { return a.position - b.position; });
  return matches;
}

// --- SEGMENTAR TEXTO EN PARES campo->valor ---
function splitIntoCommandSegments(normalizedText, matches) {
  var segments = [];
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var valueStart = m.position + m.aliasLength;
    var valueEnd = (i + 1 < matches.length) ? matches[i + 1].position : normalizedText.length;
    var valueText = normalizedText.substring(valueStart, valueEnd).trim();
    // Limpiar conectores al inicio del valor: "con", "de", "a", "es", "igual a"
    valueText = valueText.replace(/^(con|de|a|es|igual a|igual)\s+/i, '').trim();
    segments.push({ key: m.key, alias: m.alias, valueText: valueText });
  }
  return segments;
}

// --- PARSEAR VALOR DE UN SEGMENTO ---
function parseSegmentValue(segment) {
  var field = FIELD_MAP[segment.key];
  if (!segment.valueText) return { error: 'Campo "' + segment.alias + '" detectado, pero falta el valor.' };
  if (field.type === 'time') {
    var tv = parseSpokenTime(segment.valueText);
    return tv ? { value: tv } : { error: 'No se pudo interpretar la hora: "' + segment.valueText + '"' };
  } else {
    var nv = parseSpokenNumber(segment.valueText);
    return isNaN(nv) ? { error: 'No se pudo interpretar el numero: "' + segment.valueText + '"' } : { value: nv };
  }
}

// --- PARSEO MULTI-COMANDO: detecta uno o varios campos ---
function parseMultiVoiceCommand(text) {
  var normalized = normalizeVoiceText(text);
  // Verificar campos bloqueados
  var blocked = findBlockedMentions(normalized);
  // Limpiar ruido para mejorar detección
  var cleaned = cleanVoiceNoise(normalized);
  var matches = findAllFieldMatches(cleaned);
  // Si no hay matches en el texto limpio, intentar con el original normalizado
  if (matches.length === 0) matches = findAllFieldMatches(normalized);
  if (matches.length === 0) {
    var errMsg = 'No se identifico ningun campo. Diga el nombre del campo seguido del valor.';
    if (blocked.length > 0) errMsg += ' (Campos bloqueados mencionados: ' + blocked.join(', ') + ' — estos son calculados automaticamente)';
    return { success: [], errors: [{ error: errMsg }] };
  }
  var segments = splitIntoCommandSegments(cleaned.length >= normalized.length ? cleaned : (findAllFieldMatches(cleaned).length >= matches.length ? cleaned : normalized), matches);
  var success = [], errors = [];
  for (var i = 0; i < segments.length; i++) {
    var parsed = parseSegmentValue(segments[i]);
    if (parsed.error) errors.push({ alias: segments[i].alias, error: parsed.error });
    else success.push({ key: segments[i].key, alias: segments[i].alias, value: parsed.value });
  }
  if (blocked.length > 0) {
    errors.push({ alias: 'bloqueado', error: '⚠ Campos ignorados (calculados automaticamente): ' + blocked.join(', ') });
  }
  return { success: success, errors: errors };
}

// --- APLICAR TODOS LOS COMANDOS ---
function applyParsedCommands(commands) {
  for (var i = 0; i < commands.length; i++) {
    var field = FIELD_MAP[commands[i].key];
    var v = field.type === 'number' ? Number(commands[i].value) : String(commands[i].value);
    plan[field.planKey] = v;
    if (field.mirrorKey) plan[field.mirrorKey] = v;
  }
  render();
}

// --- ESCRIBIR VALOR Y RECALCULAR ---
function setFieldValue(fieldKey, value) {
  var field = FIELD_MAP[fieldKey];
  if (!field) return false;
  var v = field.type === 'number' ? Number(value) : String(value);
  plan[field.planKey] = v;
  // Si tiene mirrorKey, copiar el valor a la columna espejo (aterrizaje)
  if (field.mirrorKey) plan[field.mirrorKey] = v;
  render(); // recalcula y re-renderiza todo
  return true;
}

// --- UI DE VOZ ---
function updateVoiceUI(status, dotClass, text, result) {
  document.getElementById('voicePanel').style.display = 'block';
  document.getElementById('voiceStatus').textContent = status;
  document.getElementById('voiceDot').className = dotClass || '';
  if (text !== undefined) document.getElementById('voiceText').textContent = text;
  if (result !== undefined) {
    var el = document.getElementById('voiceResult');
    el.innerHTML = result;
    el.style.color = status.indexOf('✅') !== -1 ? '#4ade80' : (status.indexOf('❌') !== -1 ? '#ef4444' : '#4ade80');
  }
}

// --- Flasheo de campos capturables por voz ---
function setVoiceFlash(active) {
  var keys = Object.keys(FIELD_MAP);
  for (var i = 0; i < keys.length; i++) {
    var el = document.getElementById(FIELD_MAP[keys[i]].inputId);
    if (el && el.parentElement) {
      if (active) el.parentElement.classList.add('voice-flash-active');
      else el.parentElement.classList.remove('voice-flash-active');
    }
  }
}

function startVoiceInput() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    updateVoiceUI('⚠ No soportado', '', '—', 'Tu navegador no soporta voz. Usa Chrome o Edge.');
    return;
  }
  var rec = new SR();
  rec.lang = 'es-MX';
  rec.interimResults = false;
  rec.maxAlternatives = 3;
  rec.continuous = true;

  var voiceTimeout = null;
  var finalTranscript = '';
  function resetVoiceTimeout() {
    if (voiceTimeout) clearTimeout(voiceTimeout);
    voiceTimeout = setTimeout(function() { rec.stop(); }, 8000);
  }

  updateVoiceUI('🔴 Escuchando... (puede dictar varios campos)', 'dot-listening', '—', '—');
  var btn = document.getElementById('btnVoz');
  btn.disabled = true; btn.textContent = '🎤 Escuchando...';
  setVoiceFlash(true);

  function stopFlashAndReset() {
    if (voiceTimeout) clearTimeout(voiceTimeout);
    setVoiceFlash(false);
    btn.disabled = false; btn.textContent = '🎤 Ingresar por voz';
  }

  function processTranscript(t) {
    updateVoiceUI('Procesando...', '', '"' + t + '"', '—');
    var result = parseMultiVoiceCommand(t);
    if (result.success.length === 0 && result.errors.length > 0) {
      var errMsg = result.errors.map(function(e) { return e.error; }).join('<br>');
      updateVoiceUI('❌ Error', '', '"' + t + '"', errMsg);
    } else {
      applyParsedCommands(result.success);
      var summary = '';
      if (result.success.length > 0) {
        summary += '<b>✅ Actualizados (' + result.success.length + '):</b><br>';
        for (var i = 0; i < result.success.length; i++) {
          summary += '• ' + result.success[i].alias + ' → ' + result.success[i].value + '<br>';
        }
      }
      if (result.errors.length > 0) {
        summary += '<b style="color:#ef4444">⚠ No interpretados:</b><br>';
        for (var j = 0; j < result.errors.length; j++) {
          summary += '• ' + result.errors[j].error + '<br>';
        }
      }
      updateVoiceUI(result.errors.length > 0 ? '⚠ Parcial' : '✅ Listo', '', '"' + t + '"', summary);
    }
  }

  rec.onresult = function(e) {
    /* Acumular todos los resultados finales del modo continuous */
    finalTranscript = '';
    for (var i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += ' ' + e.results[i][0].transcript;
      }
    }
    finalTranscript = finalTranscript.trim();
    updateVoiceUI('🔴 Escuchando...', 'dot-listening', '"' + finalTranscript + '"', 'Sigo escuchando… hable o espere para procesar.');
    resetVoiceTimeout();
  };
  rec.onerror = function(e) {
    var m = e.error === 'no-speech' ? 'No se detectó voz.' : e.error === 'not-allowed' ? 'Permiso de micrófono denegado.' : 'Error: ' + e.error;
    if (e.error === 'no-speech' && finalTranscript) {
      processTranscript(finalTranscript);
    } else {
      updateVoiceUI('❌ ' + m, '', '—', m);
    }
    stopFlashAndReset();
  };
  rec.onend = function() {
    if (finalTranscript) {
      processTranscript(finalTranscript);
    }
    stopFlashAndReset();
  };
  resetVoiceTimeout();
  rec.start();
}

<script>
	// Don't show the lovable-badge if the page is in an iframe or if it's being rendered by puppeteer (screenshot service)
	if (window.self !== window.top || navigator.userAgent.includes('puppeteer')) {
		// the page is in an iframe
		var badge = document.getElementById('lovable-badge');
		if (badge) {
			badge.style.display = 'none';
		}
	}

	// Add click event listener to close button with animation
	var closeButton = document.getElementById('lovable-badge-close');
	if (closeButton) {
		closeButton.addEventListener('click', function(event) {
			event.preventDefault();
			event.stopPropagation();
			var badge = document.getElementById('lovable-badge');
			if (badge) {
				badge.classList.add('closing');
				setTimeout(function() {
					if (badge) {
						badge.style.display = 'none';
					}
				}, 240);
			}
		});
	}
</script>
